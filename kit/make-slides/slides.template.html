<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>◯◯ — スライド（make-slides テンプレ）</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  /* ===== ここを DESIGN.md の :root ブロックで丸ごと差し替える ===== */
  :root{
    --brand:#1C3461; --brand-deep:#16284A; --brand-soft:rgba(28,52,97,.08); --brand-line:rgba(28,52,97,.22);
    --accent:#5BBCD4; --accent-deep:#2C7A93; --accent-soft:rgba(91,188,212,.16);
    --bg:#F7FAFC; --paper:#FFFFFF; --ink:#1C3461; --ink-mid:#4A6080; --ink-sub:#8098B4; --line:rgba(28,52,97,.12);
    --canvas:#D8E0EC; --head:'Noto Sans JP';
  }
  /* ===== ここまで（DESIGN.md 差し替え範囲）===== */

  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--canvas);display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;font-family:var(--head),-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;color:var(--ink);}
  .slide{width:1280px;height:720px;background:var(--bg);position:relative;display:none;
    flex-direction:column;align-items:center;justify-content:center;padding:62px 78px 72px;overflow:hidden;}
  .slide.active{display:flex;}
  .slide::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;
    background:linear-gradient(90deg,var(--brand) 0%,var(--brand-deep) 52%,var(--accent) 100%);}
  .coin{position:absolute;width:120px;height:120px;border-radius:50%;background:var(--accent);opacity:.13;top:-42px;left:-36px;}
  .eyebrow{font-family:var(--head);font-size:13px;font-weight:900;color:var(--brand-deep);letter-spacing:2px;margin-bottom:14px;}
  h1{font-family:var(--head);font-size:54px;font-weight:900;color:var(--ink);line-height:1.22;text-align:center;margin-bottom:20px;}
  h2{font-family:var(--head);font-size:38px;font-weight:900;color:var(--ink);line-height:1.25;text-align:center;margin-bottom:24px;}
  .lead{font-size:21px;color:var(--ink-mid);line-height:1.7;text-align:center;max-width:900px;font-weight:700;}
  .sep{width:56px;height:4px;background:linear-gradient(90deg,var(--brand),var(--accent));border-radius:3px;margin:14px auto;}
  .bullets{list-style:none;width:100%;max-width:880px;}
  .bullets li{font-size:25px;font-weight:700;color:var(--ink);padding:14px 0 14px 44px;position:relative;border-bottom:1px solid var(--line);}
  .bullets li::before{content:'';position:absolute;left:4px;top:50%;transform:translateY(-50%);width:13px;height:13px;border-radius:50%;background:var(--accent);}
  .tldr{display:flex;gap:16px;width:100%;max-width:1040px;}
  .tldr .t{flex:1;background:var(--paper);border:1.5px solid var(--line);border-left:4px solid var(--accent);border-radius:14px;padding:22px 20px;}
  .tldr .t .k{font-family:var(--head);font-weight:900;color:var(--ink);font-size:14px;margin-bottom:7px;}
  .tldr .t p{font-size:17px;color:var(--ink);font-weight:700;line-height:1.5;}
  /* テーブル見出しは ink地＋白字（コントラスト規約） */
  table.cmp{width:100%;max-width:1040px;border-collapse:separate;border-spacing:0;font-size:18px;background:var(--paper);border:1.5px solid var(--line);border-radius:14px;overflow:hidden;}
  table.cmp th,table.cmp td{padding:13px 18px;text-align:left;border-bottom:1px solid var(--line);}
  table.cmp thead th{background:var(--ink);color:#fff;font-weight:700;font-size:16px;}
  table.cmp td:first-child{font-weight:700;} table.cmp .yes{color:var(--brand-deep);font-weight:900;}
  .question{background:var(--accent-soft);border:1.5px solid var(--accent);border-radius:16px;padding:28px 32px;max-width:900px;text-align:center;}
  .question .q{font-family:var(--head);font-weight:900;font-size:26px;color:var(--ink);}
  .sno{position:absolute;bottom:20px;right:44px;font-size:12px;color:var(--ink-mid);}
  .nav{display:flex;align-items:center;gap:20px;margin-top:16px;}
  .nav-btn{background:var(--paper);border:1.5px solid var(--line);color:var(--brand-deep);padding:9px 26px;border-radius:10px;cursor:pointer;font-weight:700;}
  .counter{color:var(--ink-mid);font-size:14px;min-width:70px;text-align:center;}
</style>
</head>
<body>

<!-- 各スライドは <div class="slide"> … <span class="sno"></span></div> の単位。
     番号は空でOK（JSが自動採番）。コメント <!-- 名前 --> をアンカーに編集すると番号ズレに強い。 -->

<!-- cover -->
<div class="slide active"><span class="coin"></span>
  <p class="eyebrow">AI を使いこなす</p>
  <h1>◯◯ 徹底解説</h1>
  <div class="sep"></div>
  <p class="lead">◯◯って結局なに？ 何ができて、どう実務に活かすのか</p>
  <span class="sno"></span>
</div>

<!-- pain -->
<div class="slide">
  <h2>こんな悩み、ありませんか？</h2>
  <ul class="bullets"><li>あるある①</li><li>あるある②</li><li>あるある③</li></ul>
  <span class="sno"></span>
</div>

<!-- tldr -->
<div class="slide">
  <h2>結論</h2>
  <div class="tldr">
    <div class="t"><div class="k">POINT 1</div><p>要点1</p></div>
    <div class="t"><div class="k">POINT 2</div><p>要点2</p></div>
    <div class="t"><div class="k">POINT 3</div><p>要点3</p></div>
  </div>
  <span class="sno"></span>
</div>

<!-- question（5〜8枚に1回の参加点） -->
<div class="slide">
  <div class="question"><div class="q">あなたが毎週くり返している作業を、1つだけ挙げてみてください</div></div>
  <span class="sno"></span>
</div>

<!-- ここに <div class="slide">…</div> を増やしていく。番号は自動で振られる。 -->

<div class="nav">
  <button class="nav-btn" onclick="go(-1)">← 前へ</button>
  <span class="counter" id="ctr">1 / 1</span>
  <button class="nav-btn" onclick="go(1)">次へ →</button>
</div>
<script>
  // 通し番号・カウンターは「スライド数を数えて自動採番」（ハードコード禁止）
  let cur = 0;
  const slides = document.querySelectorAll('.slide');
  const total = slides.length;
  function numberSlides(){ slides.forEach((s,i)=>{ const n=s.querySelector('.sno'); if(n) n.textContent=(i+1); }); }
  function showSlide(n){
    slides.forEach(s=>s.classList.remove('active'));
    cur=((n%total)+total)%total;
    slides[cur].classList.add('active');
    document.getElementById('ctr').textContent=(cur+1)+' / '+total;
  }
  function go(d){ showSlide(cur+d); }
  document.addEventListener('keydown',e=>{
    if(['ArrowRight','ArrowDown',' '].includes(e.key)){e.preventDefault();go(1);}
    if(['ArrowLeft','ArrowUp'].includes(e.key)){e.preventDefault();go(-1);}
  });
  numberSlides(); showSlide(0);
</script>
</body>
</html>
